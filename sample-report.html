<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sample Report — Lävi Clinical Suite</title>
<meta name="description" content="Sample longitudinal MS lesion analysis report generated by Lävi MS pipeline. See how automated lesion detection, volume tracking, and clinical-grade reporting work in practice.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://lavi-clinical.com/sample-report.html">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

:root {
  --clr-brand: #1a3a5c;
  --clr-brand-light: #2d7ab6;
  --clr-text: #1e2d3d;
  --clr-text-secondary: #5a6f82;
  --clr-border: #dde3e8;
  --clr-bg-subtle: #f5f7fa;
  --clr-success: #1a8a52;
  --clr-success-bg: #e8f7ef;
  --clr-warning: #c4880c;
  --clr-warning-bg: #fef6e8;
  --clr-danger: #c43a2e;
  --clr-danger-bg: #fdf0ef;
  --clr-increase: #c43a2e;
  --clr-decrease: #1a8a52;
  --clr-neutral: #5a6f82;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 13px;
  line-height: 1.6;
  color: var(--clr-text);
  background: #eef2f7;
  -webkit-font-smoothing: antialiased;
}

/* ── Back link bar ── */
.back-bar {
  background: var(--clr-brand);
  padding: 0.75rem 2rem;
  text-align: left;
}
.back-bar a {
  color: #fff;
  text-decoration: none;
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  opacity: 0.9;
  transition: opacity 0.2s;
}
.back-bar a:hover { opacity: 1; }
.back-bar a::before { content: '\2190\00a0'; }

/* ── Sample banner ── */
.sample-banner {
  background: var(--clr-warning-bg);
  border-bottom: 2px solid #d4ac0d;
  padding: 0.75rem 2rem;
  text-align: center;
  font-family: 'Inter', sans-serif;
  font-size: 0.8rem;
  color: #7d6608;
  font-weight: 600;
}

/* ── Report wrapper ── */
.report-wrapper {
  max-width: 920px;
  margin: 2rem auto;
  padding: 0;
}

.report-wrapper iframe {
  width: 100%;
  height: calc(100vh - 140px);
  min-height: 600px;
  border: 1px solid var(--clr-border);
  border-radius: 10px;
  background: #fff;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}

/* ── Footer ── */
.sample-footer {
  text-align: center;
  padding: 1.5rem 2rem;
  font-family: 'Inter', sans-serif;
  font-size: 0.75rem;
  color: var(--clr-text-secondary);
}
.sample-footer a {
  color: var(--clr-brand-light);
  text-decoration: none;
}
.sample-footer a:hover { text-decoration: underline; }

@media (max-width: 960px) {
  .report-wrapper { margin: 1rem; }
}
</style>
</head>
<body>

<div class="back-bar">
  <a href="/">Back to Lävi Clinical Suite</a>
</div>

<div class="sample-banner">
  This is a sample report with synthetic data for demonstration purposes only. It does not represent a real patient.
</div>

<div class="report-wrapper">
  <iframe src="sample-report-content.html" title="Sample Longitudinal MS Lesion Analysis Report"></iframe>
</div>

<div class="sample-footer">
  <a href="/">Lävi Clinical Suite</a> &mdash; AI-powered longitudinal MRI analysis for Multiple Sclerosis.
</div>

</body>
</html>
